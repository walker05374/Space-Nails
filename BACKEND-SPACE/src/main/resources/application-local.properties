# ===============================================================
# PERFIL LOCAL - Usa H2 em memória (sem precisar do PostgreSQL)
# ===============================================================

# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:spacenailsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Desabilita HikariCP (não precisa de pool para H2)
spring.datasource.hikari.connection-timeout=5000

# JPA - cria tabelas automaticamente (create-drop = cria ao iniciar, apaga ao encerrar)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 acessível em http://localhost:5555/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta do backend local
server.port=5555

# Frontend via tunnel Cloudflare
app.frontend.url=https://space.walkerteste.site
